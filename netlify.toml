[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# MCP endpoint for Claude Cowork / Claude Code connectors. Lives at /mcp so
# the connector URL is short and easy to paste.
[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

# OAuth 2.1 metadata + endpoints for the MCP server. Claude.ai discovers the
# auth server via the .well-known URLs, then runs the standard authorization
# code + PKCE flow. See netlify/functions/oauth.js.
[[redirects]]
  from = "/.well-known/oauth-protected-resource"
  to = "/.netlify/functions/oauth?path=metadata-resource"
  status = 200
  force = true
[[redirects]]
  from = "/.well-known/oauth-authorization-server"
  to = "/.netlify/functions/oauth?path=metadata-as"
  status = 200
  force = true
[[redirects]]
  from = "/oauth/register"
  to = "/.netlify/functions/oauth?path=register"
  status = 200
  force = true
[[redirects]]
  from = "/oauth/authorize"
  to = "/.netlify/functions/oauth?path=authorize"
  status = 200
  force = true
[[redirects]]
  from = "/oauth/consent"
  to = "/.netlify/functions/oauth?path=consent"
  status = 200
  force = true
[[redirects]]
  from = "/oauth/token"
  to = "/.netlify/functions/oauth?path=token"
  status = 200
  force = true

# Handle SPA routing — functions first so /.netlify/functions/* isn't rewritten
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Asset optimization
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true
